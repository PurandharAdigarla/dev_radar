<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Radar — Product screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --dr-background: #faf9f7;
    --dr-surface: #ffffff;
    --dr-text-primary: #2d2a26;
    --dr-text-secondary: #6b655e;
    --dr-divider: #e8e4df;
    --dr-accent: #2d2a26;
    --dr-accent-hover: #000000;
    --dr-error: #b3261e;
    --dr-success: #2d7a3e;
  }
  html, body, #root { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
  a { color: inherit; }

  @keyframes dr-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.85); } }
  @keyframes dr-fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes dr-shimmer { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-source="design-canvas.jsx">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });


</script>
<script type="text/babel" data-source="screens.jsx">
// Dev Radar — four screen components.
// Pure presentational. `onNavigate(key)` is optional; when absent (static
// artboard use), clicks are no-ops. Error state is driven by props so the
// design-canvas can show error/clean side by side.

const DR_FONT_UI = "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif";
const DR_FONT_MONO = "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace";

// ─── Primitives ─────────────────────────────────────────────────────────

function DRButton({ variant = 'primary', fullWidth, children, onClick, accent, accentHover, type = 'button' }) {
  const [hover, setHover] = React.useState(false);
  const [focus, setFocus] = React.useState(false);
  const base = {
    fontFamily: DR_FONT_UI,
    fontSize: 15,
    fontWeight: 500,
    lineHeight: 1,
    padding: '12px 20px',
    borderRadius: 999, // pill
    border: variant === 'outlined' ? '1px solid var(--dr-divider)' : '1px solid transparent',
    cursor: 'pointer',
    transition: 'background 120ms ease, color 120ms ease, border-color 120ms ease, box-shadow 120ms ease',
    width: fullWidth ? '100%' : 'auto',
    outline: 'none',
    boxShadow: focus ? `0 0 0 2px ${accent}` : 'none',
    letterSpacing: 0,
  };
  const primary = {
    background: hover ? accentHover : accent,
    color: '#ffffff',
  };
  const outlined = {
    background: hover ? 'rgba(45,42,38,0.04)' : 'transparent',
    color: 'var(--dr-text-primary)',
    borderColor: 'var(--dr-divider)',
  };
  const ghost = {
    background: 'transparent',
    color: 'var(--dr-text-secondary)',
    padding: '6px 8px',
    borderRadius: 6,
    border: '1px solid transparent',
    fontSize: 14,
    boxShadow: 'none',
  };
  const style = {
    ...base,
    ...(variant === 'primary' ? primary : variant === 'outlined' ? outlined : ghost),
  };
  if (variant === 'ghost' && hover) style.color = 'var(--dr-text-primary)';
  return (
    <button
      type={type}
      style={style}
      onClick={onClick}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      onFocus={() => setFocus(true)}
      onBlur={() => setFocus(false)}
    >
      {children}
    </button>
  );
}

function DRField({ label, value, onChange, type = 'text', autoComplete, helper, id }) {
  const [focus, setFocus] = React.useState(false);
  const fid = id || `f-${label.replace(/\s+/g, '-').toLowerCase()}`;
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>

          fontFamily: DR_FONT_UI, fontSize: 13, lineHeight: '20px',
          fontWeight: 500, color: 'var(--dr-text-primary)',

        {label}
      </label>
      <input
        id={fid}
        type={type}
        value={value}
        autoComplete={autoComplete}
        onChange={(e) => onChange && onChange(e.target.value)}
        onFocus={() => setFocus(true)}
        onBlur={() => setFocus(false)}
        style={{
          fontFamily: DR_FONT_UI,
          fontSize: 15,
          lineHeight: '24px',
          color: 'var(--dr-text-primary)',
          background: 'var(--dr-surface)',
          border: '1px solid var(--dr-divider)',
          borderRadius: 8,
          padding: '10px 14px',
          outline: 'none',

          width: '100%',
          boxSizing: 'border-box',
        }}
      />
      {helper && (
        <div style={{ fontFamily: DR_FONT_UI, fontSize: 13, lineHeight: '20px', color: 'var(--dr-text-secondary)' }}>
          {helper}
        </div>
      )}
    </div>
  );
}

function DRAlert({ children }) {
  return (
    <div role="alert" style={{
      fontFamily: DR_FONT_UI, fontSize: 14, lineHeight: '20px',

        <path d="M8 4.5v4M8 11v.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" />
      </svg>
      <span>{children}</span>
    </div>

}

function LandingScreen({ onNavigate, accent, accentHover, serifAccent }) {

function TagChip({ tag, selected, onToggle, chipStyle }) {
  const [hover, setHover] = React.useState(false);
  const useCheck = chipStyle === 'checkmark';

  const baseStyle = {
    display: 'inline-flex', alignItems: 'center', gap: 6,
    padding: '6px 14px',
    borderRadius: 999,
    fontFamily: DR_FONT_UI,
    fontSize: 14, lineHeight: '20px',
    fontWeight: 500,
    cursor: 'pointer',
    border: '1px solid var(--dr-divider)',
    background: 'var(--dr-surface)',
    color: 'var(--dr-text-primary)',
    userSelect: 'none',
    transition: 'background 120ms, border-color 120ms, color 120ms',
  };

  let style;
  if (!useCheck) {
    if (selected) {
      style = { ...baseStyle,
        background: hover ? '#000' : 'var(--dr-text-primary)',
        color: '#fff',
        borderColor: 'var(--dr-text-primary)',
      };
    } else {
      style = { ...baseStyle,
        background: hover ? 'rgba(45,42,38,0.04)' : 'var(--dr-surface)',
      };
    }
  } else {
    style = { ...baseStyle,
      background: hover ? 'rgba(45,42,38,0.04)' : 'var(--dr-surface)',
      borderColor: selected ? 'var(--dr-text-primary)' : 'var(--dr-divider)',
    };
  }

  return (
    <span
      role="button"
      aria-pressed={selected}
      onClick={() => onToggle && onToggle(tag.slug)}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={style}
    >
      {useCheck && selected && (
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{ flexShrink: 0 }}>
          <path d="M2.5 6.5l2.5 2.5 4.5-5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {tag.displayName}
    </span>
  );
}

function InterestsScreen({ selected, onChange, onSave, chipStyle = 'filled', initialSaved }) {
  const [query, setQuery] = React.useState('');
  const [localSelected, setLocal] = React.useState(selected || new Set());
  const [savedSnapshot, setSavedSnap] = React.useState(initialSaved || selected || new Set());

  React.useEffect(() => { if (selected) setLocal(new Set(selected)); }, [selected]);

  const toggle = (slug) => {
    const next = new Set(localSelected);
    if (next.has(slug)) next.delete(slug); else next.add(slug);
    setLocal(next);
    onChange && onChange(next);
  };

  const q = query.trim().toLowerCase();
  const visible = INTEREST_TAGS.filter((t) =>
    !q || t.displayName.toLowerCase().includes(q) || t.slug.includes(q)
  );
  const byCategory = {};
  for (const t of visible) {
    (byCategory[t.category] = byCategory[t.category] || []).push(t);
  }
  const catOrder = ['language', 'framework', 'database', 'devops', 'security', 'other'];

  const changed = (() => {
    if (localSelected.size !== savedSnapshot.size) return true;
    for (const s of localSelected) if (!savedSnapshot.has(s)) return true;
    return false;
  })();

  const save = () => {
    setSavedSnap(new Set(localSelected));
    onSave && onSave(new Set(localSelected));
  };

  return (
    <>
      <PageHeader title="Interests" sub="Pick topics your weekly radar should cover." />

      <div style={{ display: 'flex', gap: 16, alignItems: 'center', marginBottom: 40, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 280, maxWidth: 420 }}>
          <input
            type="text"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="Search tags…"
            aria-label="Search tags"
            style={{
              width: '100%',
              fontFamily: DR_FONT_UI, fontSize: 15, lineHeight: '24px',
              color: 'var(--dr-text-primary)',
              background: 'var(--dr-surface)',
              border: '1px solid var(--dr-divider)',
              borderRadius: 8,
              padding: '10px 14px',
              outline: 'none',
              boxSizing: 'border-box',
            }}
            onFocus={(e) => {
              e.target.style.borderColor = 'var(--dr-text-primary)';
              e.target.style.boxShadow = '0 0 0 2px var(--dr-text-primary)';
            }}
            onBlur={(e) => {
              e.target.style.borderColor = 'var(--dr-divider)';
              e.target.style.boxShadow = 'none';
            }}
          />
        </div>
        <div style={{
          fontFamily: DR_FONT_UI, fontSize: 14, color: 'var(--dr-text-secondary)',
          fontVariantNumeric: 'tabular-nums',
        }}>
          <strong style={{ color: 'var(--dr-text-primary)', fontWeight: 500 }}>{localSelected.size}</strong> selected
        </div>
        <div style={{ flex: 1 }} />
        <button
          onClick={save}
          disabled={!changed}
          style={{
            fontFamily: DR_FONT_UI, fontSize: 15, fontWeight: 500,
            padding: '12px 20px',
            borderRadius: 999,
            border: 'none',
            background: changed ? 'var(--dr-text-primary)' : 'rgba(45,42,38,0.15)',
            color: '#fff',
            cursor: changed ? 'pointer' : 'not-allowed',
            transition: 'background 120ms',
          }}
        >Save</button>
      </div>

      {visible.length === 0 && (
        <div style={{
          padding: '40px 0',
          textAlign: 'center',
          color: 'var(--dr-text-secondary)', fontSize: 14,
        }}>No tags match “{query}”.</div>
      )}

      {catOrder.filter((c) => byCategory[c]).map((c) => (
        <section key={c} style={{ marginBottom: 40 }}>
          <DROverline style={{ marginBottom: 16 }}>{CATEGORY_LABEL[c]}</DROverline>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {byCategory[c].map((t) => (
              <TagChip key={t.slug} tag={t}
                selected={localSelected.has(t.slug)}
                onToggle={toggle}
                chipStyle={chipStyle} />
            ))}
          </div>
        </section>
      ))}
    </>
  );
}

function formatDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function StatusTag({ status }) {
  if (status === 'READY') {
    return (
      <span style={{
        fontFamily: DR_FONT_UI, fontSize: 11, letterSpacing: '0.06em',
        textTransform: 'uppercase', color: 'var(--dr-text-secondary)',
        fontWeight: 500,
      }}>Ready</span>
    );
  }
  if (status === 'GENERATING') {
    return (
      <span style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        fontFamily: DR_FONT_UI, fontSize: 11, letterSpacing: '0.06em',
        textTransform: 'uppercase', color: 'var(--dr-text-primary)',
        fontWeight: 500,
      }}>
        <PulseDot /> Generating
      </span>
    );
  }
  if (status === 'FAILED') {
    return (
      <span style={{
        fontFamily: DR_FONT_UI, fontSize: 11, letterSpacing: '0.06em',
        textTransform: 'uppercase', color: 'var(--dr-error)',
        fontWeight: 500,
      }}>Failed</span>
    );
  }
  return null;
}

function PulseDot({ size = 7, color = 'var(--dr-text-primary)' }) {
  return (
    <span style={{
      display: 'inline-block', width: size, height: size, borderRadius: 999,
      background: color,
      animation: 'dr-pulse 1.2s ease-in-out infinite',
    }} />
  );
}

function RadarRow({ radar, rowStyle = 'editorial', onClick }) {
  const [hover, setHover] = React.useState(false);
  const end = new Date(radar.periodEnd);
  const start = new Date(radar.periodStart);

  const inner = (
    <>
      <div style={{ minWidth: 0 }}>
        <div style={{
          fontFamily: DR_FONT_UI, fontSize: 16, lineHeight: '24px', fontWeight: 500,
          color: 'var(--dr-text-primary)', marginBottom: 4, letterSpacing: '-0.005em',
        }}>
          Week of {formatDate(start)} – {formatDate(end)}
        </div>
        <div style={{
          fontFamily: DR_FONT_UI, fontSize: 13, lineHeight: '20px',
          color: 'var(--dr-text-secondary)',
          display: 'flex', gap: 12, flexWrap: 'wrap',
          fontVariantNumeric: 'tabular-nums',
        }}>
          {radar.status === 'READY' && <>
            <span>{radar.themeCount} themes</span>
            <span>·</span>
            <span>{(radar.tokenCount / 1000).toFixed(1)}k tokens</span>
            <span>·</span>
            <span>{(radar.generationMs / 1000).toFixed(1)}s</span>
          </>}
          {radar.status === 'GENERATING' && <span>Streaming themes now…</span>}

        </div>

  if (rowStyle === 'card') {
    return (
      <div onClick={onClick}
        onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}

          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24,

          borderRadius: 8,
          cursor: 'pointer',
          transition: 'background 120ms',

  return (
    <div onClick={onClick}

        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24,
        padding: '20px 12px',

        onClick={(e) => { if (onOpen) { e.preventDefault(); onOpen(source); } }}
        style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',

        }}>
          {source.title}
          {source.author && <span style={{ opacity: 0.6, marginLeft: 6 }}>· {source.author}</span>}
        </span>

}

function Theme({ theme, index }) {

function ThemeSkeleton() {

}

function ProposalCard({ proposal, onApprove, onDismiss, onRetry }) {
  const isExecuted = proposal.status === 'EXECUTED';
  const isDismissed = proposal.status === 'DISMISSED';
  const isFailed = proposal.status === 'FAILED';

  return (
    <div style={{
      padding: 16,
      background: 'var(--dr-surface)',
      border: '1px solid var(--dr-divider)',
      borderRadius: 8,
      marginBottom: 12,
      opacity: isDismissed ? 0.5 : 1,
      transition: 'opacity 200ms',
    }}>
      <div style={{
        fontFamily: DR_FONT_MONO, fontSize: 11, letterSpacing: '0.04em',
        color: 'var(--dr-text-secondary)',
        marginBottom: 6,
      }}>{proposal.cveId}</div>
      <div style={{
        fontFamily: DR_FONT_UI, fontSize: 14, lineHeight: '20px', fontWeight: 500,
        color: 'var(--dr-text-primary)',
        marginBottom: 10,

      <div style={{
        display: 'flex', alignItems: 'center', gap: 8,

        <span style={{ fontWeight: 500 }}>{proposal.toVersion}</span>
      </div>

      {isFailed && (
        <div style={{
          marginBottom: 12,
          padding: '10px 12px',
          background: 'rgba(179,38,30,0.06)',
          border: '1px solid rgba(179,38,30,0.2)',
          borderRadius: 6,
          fontSize: 12, lineHeight: '18px',
          color: 'var(--dr-error)',
        }}>{proposal.failureReason}</div>
      )}

      {proposal.status === 'PROPOSED' && (
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <button
            onClick={() => onApprove && onApprove(proposal.id)}
            style={{
              fontFamily: DR_FONT_UI, fontSize: 13, fontWeight: 500,
              padding: '8px 14px',
              borderRadius: 999,
              border: 'none',
              background: 'var(--dr-text-primary)', color: '#fff',
              cursor: 'pointer',
            }}
          >Approve</button>
          <button
            onClick={() => onDismiss && onDismiss(proposal.id)}
            style={{
              fontFamily: DR_FONT_UI, fontSize: 13,
              padding: '8px 10px',
              borderRadius: 6,
              border: 'none',
              background: 'transparent', color: 'var(--dr-text-secondary)',
              cursor: 'pointer',
            }}
          >Dismiss</button>
        </div>
      )}

      {isExecuted && (
        <a
          href={proposal.prUrl}
          target="_blank"
          rel="noreferrer noopener"
          style={{
            display: 'inline-flex', alignItems: 'center', gap: 6,
            fontFamily: DR_FONT_UI, fontSize: 13, fontWeight: 500,
            color: 'var(--dr-success)',
            textDecoration: 'none',
          }}
        >
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 7.5l3 3 7-7" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          PR opened →
        </a>
      )}

      {isDismissed && (
        <div style={{
          fontFamily: DR_FONT_UI, fontSize: 13,
          color: 'var(--dr-text-secondary)',
        }}>Dismissed</div>
      )}

      {isFailed && (
        <button
          onClick={() => onRetry && onRetry(proposal.id)}
          style={{
            fontFamily: DR_FONT_UI, fontSize: 13, fontWeight: 500,
            padding: '8px 14px',
            borderRadius: 999,
            border: '1px solid var(--dr-divider)',
            background: 'transparent', color: 'var(--dr-text-primary)',
            cursor: 'pointer',
          }}
        >Retry</button>

}

function ApproveModal({ proposal, onCancel, onConfirm }) {
  const [version, setVersion] = React.useState(proposal.toVersion);
  const [loading, setLoading] = React.useState(false);

  const submit = (e) => {
    e && e.preventDefault();
    setLoading(true);
    setTimeout(() => { onConfirm && onConfirm(proposal.id, version); }, 1800);
  };

  return (
    <div
      onClick={onCancel}
      style={{
        position: 'fixed', inset: 0, zIndex: 500,
        background: 'rgba(45,42,38,0.35)',

        padding: 20, fontFamily: DR_FONT_UI,
      }}
    >
      <form
        onClick={(e) => e.stopPropagation()}

        style={{
          width: 420,
          maxWidth: '100%',
          background: 'var(--dr-surface)',
          borderRadius: 12,
          boxShadow: '0 1px 2px rgba(45,42,38,0.04), 0 12px 40px rgba(45,42,38,0.15)',
          padding: 28,
          color: 'var(--dr-text-primary)',
        }}
      >
        <h3 style={{
          margin: 0, fontSize: 20, lineHeight: '28px', fontWeight: 500,
          letterSpacing: '-0.01em',

        }}>Open migration PR</h3>
        <p style={{
          margin: '0 0 24px', fontSize: 14, lineHeight: '22px',
          color: 'var(--dr-text-secondary)',
        }}>This will push a branch to your GitHub repo and open a PR. You can review it before merging.</p>

        <div style={{
          padding: '12px 14px',
          background: 'rgba(45,42,38,0.03)',
          borderRadius: 8, marginBottom: 20,
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
          fontSize: 13,
        }}>
          <div>
            <div style={{ fontFamily: DR_FONT_MONO, fontSize: 11, color: 'var(--dr-text-secondary)' }}>{proposal.cveId}</div>
            <div style={{ fontWeight: 500, marginTop: 2 }}>{proposal.packageName}</div>
          </div>
          <div style={{ fontFamily: DR_FONT_MONO, color: 'var(--dr-text-secondary)' }}>
            {proposal.fromVersion}
          </div>
        </div>

        <label style={{ display: 'block', marginBottom: 24 }}>
          <span style={{ display: 'block', fontSize: 13, fontWeight: 500, marginBottom: 8 }}>Upgrade to version</span>
          <input
            type="text"
            value={version}
            onChange={(e) => setVersion(e.target.value)}
            disabled={loading}
            style={{
              width: '100%',
              fontFamily: DR_FONT_MONO, fontSize: 14, lineHeight: '20px',
              color: 'var(--dr-text-primary)',
              background: 'var(--dr-surface)',
              border: '1px solid var(--dr-divider)',
              borderRadius: 8,
              padding: '10px 14px',
              outline: 'none',
              boxSizing: 'border-box',
            }}
          />
        </label>

        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <button
            type="button"
            onClick={onCancel}
            disabled={loading}
            style={{
              fontFamily: DR_FONT_UI, fontSize: 14,
              padding: '10px 16px',
              borderRadius: 999,
              border: 'none',
              background: 'transparent', color: 'var(--dr-text-secondary)',
              cursor: loading ? 'not-allowed' : 'pointer',
            }}
          >Cancel</button>
          <button
            type="submit"
            disabled={loading}
            style={{
              fontFamily: DR_FONT_UI, fontSize: 14, fontWeight: 500,
              padding: '10px 18px',
              borderRadius: 999,
              border: 'none',
              background: 'var(--dr-text-primary)', color: '#fff',
              cursor: loading ? 'wait' : 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 8,
              opacity: loading ? 0.8 : 1,
            }}
          >
            {loading && <PulseDot size={6} color="#fff" />}
            {loading ? 'Opening PR…' : 'Open PR'}
          </button>
        </div>
      </form>
    </div>
  );
}

function RadarDetailScreen({ radar, themes, streaming, expectedThemeCount, proposals, onApprove, onDismiss, onRetry, onReplay }) {
  const [modalFor, setModalFor] = React.useState(null);

  const start = new Date(radar.periodStart);
  const end = new Date(radar.periodEnd);
  const pendingCount = streaming ? Math.max(0, expectedThemeCount - themes.length) : 0;

  const visibleProposals = (proposals || []).filter((p) => p.status !== 'DISMISSED' || p._keepVisible !== false);

  return (
    <>
      <div style={{
        display: 'grid',
        gridTemplateColumns: 'minmax(0, 720px) 300px',
        gap: 48,
        alignItems: 'flex-start',
      }}>
        {/* Read column */}
        <div>
          <div style={{ marginBottom: 40 }}>
            <DROverline style={{ marginBottom: 8 }}>Week of {formatDate(start)} – {formatDate(end)}</DROverline>
            <h1 style={{
              margin: 0, fontFamily: DR_FONT_UI,
              fontSize: 32, lineHeight: '40px', fontWeight: 500,
              letterSpacing: '-0.01em', color: 'var(--dr-text-primary)',
            }}>{radar.title || 'This week in your stack'}</h1>
            <div style={{
              marginTop: 12,
              fontFamily: DR_FONT_UI, fontSize: 13, lineHeight: '20px',
              color: 'var(--dr-text-secondary)',
              display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
              fontVariantNumeric: 'tabular-nums',
            }}>
              {streaming ? (
                <>
                  <PulseDot />
                  <span>Generating themes…</span>
                  <span>·</span>
                  <span>{themes.length} of {expectedThemeCount}</span>
                </>
              ) : (
                <>
                  <span>{themes.length} themes</span>
                  <span>·</span>
                  <span>{(radar.generationMs / 1000).toFixed(1)}s</span>
                  <span>·</span>
                  <span>{(radar.tokenCount / 1000).toFixed(1)}k tokens</span>
                  {onReplay && (
                    <>
                      <span style={{ opacity: 0.4 }}>·</span>
                      <button onClick={onReplay}
                        style={{
                          background: 'transparent', border: 'none', padding: 0,
                          fontFamily: 'inherit', fontSize: 'inherit',
                          color: 'var(--dr-text-primary)', cursor: 'pointer',
                          textDecoration: 'underline', textUnderlineOffset: 3,
                        }}>Replay stream</button>
                    </>
                  )}
                </>
              )}
            </div>
          </div>

          {themes.filter(Boolean).map((t, i) => <Theme key={t.id || i} theme={t} index={i} />)}
          {streaming && Array.from({ length: pendingCount }).map((_, i) => <ThemeSkeleton key={'sk-' + i} />)}

          {!streaming && themes.length === 0 && (
            <div style={{
              padding: '80px 24px',
              textAlign: 'center',
              border: '1px dashed var(--dr-divider)',
              borderRadius: 12,
              color: 'var(--dr-text-secondary)',
              fontSize: 14,
            }}>No themes generated.</div>
          )}
        </div>

        {/* Proposals column */}
        {visibleProposals.length > 0 && (
          <aside>
            <DROverline style={{ marginBottom: 16 }}>Action proposals</DROverline>
            {visibleProposals.map((p) => (
              <ProposalCard key={p.id} proposal={p}
                onApprove={() => setModalFor(p)}
                onDismiss={onDismiss}
                onRetry={onRetry}
              />
            ))}
          </aside>
        )}
      </div>

      {modalFor && (
        <ApproveModal
          proposal={modalFor}
          onCancel={() => setModalFor(null)}
          onConfirm={(id, version) => { setModalFor(null); onApprove && onApprove(id, version); }}
        />
      )}
    </>
  );
}

Object.assign(window, {
  AppShell, PageHeader,
  InterestsScreen, RadarListScreen, RadarDetailScreen,
  INTEREST_TAGS,
  DR_FONT_SERIF,
});

</script>
<script type="text/babel" data-source="product-app.jsx">
// Dev Radar — product app. Wires Interests / Radars / Detail into an
// interactive prototype with simulated SSE streaming, and exposes a design
// canvas with state variants. Tweaks expose chip style + row style.

const PRODUCT_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "chipStyle": "filled",
  "rowStyle": "editorial",
  "autoStream": true
}/*EDITMODE-END*/;

// ─── Mock data ──────────────────────────────────────────────────────────

const DEFAULT_INTERESTS = new Set(['java', 'spring', 'postgres', 'kubernetes', 'cve-java', 'supply-chain', 'observability']);

function mkRadar(i, status = 'READY', daysAgo = 0, overrides = {}) {
  const end = new Date(2026, 3, 20 - daysAgo);
  const start = new Date(end); start.setDate(end.getDate() - 7);
  return {
    id: 'r' + i,
    status,
    periodStart: start.toISOString(),
    periodEnd: end.toISOString(),
    themeCount: 3,
    tokenCount: 4200 + i * 180,
    generationMs: 11800 + i * 400,
    ...overrides,
  };
}

const SAMPLE_THEMES = [
  {
    id: 't1',
    title: 'Spring 6.2 locks in virtual-thread defaults',
    summary: "Spring's latest point release quietly flips virtual threads from opt-in to on-by-default for servlet-based apps, following the lead of Jetty 12 and Tomcat 11. The migration is surprisingly undramatic for typical CRUD workloads — the team's benchmarks show throughput holding steady while p99 latency drops by a third on I/O-bound endpoints. The caveat is synchronized blocks and @Transactional proxies, which still pin carriers: two well-cited blog posts this week walked through converting a mid-sized checkout service and hit exactly those edges. If you've been sitting on a Loom migration, the guard-rails are now good enough to try.",
    citations: [
      { title: 'Spring 6.2 release notes — virtual threads', url: '#', author: 'spring.io' },
      { title: 'Loom migration at checkout scale', url: '#', author: 'netflixtechblog' },
      { title: '@Transactional pinning, revisited', url: '#', author: 'Nicolai Parlog' },
    ],
  },
  {
    id: 't2',
    title: 'PostgreSQL 17.2 tightens up logical replication',
    summary: "This week's 17.2 point release isn't flashy but lands two fixes worth your attention: a long-standing publication-table mismatch that could silently drop updates on schema changes, and a planner regression affecting partitioned BRIN indexes. Both shipped in response to vendor-reported incidents. The release also quietly improves vacuum parallelism on very wide tables — practitioners running multi-terabyte OLTP report the full vacuum window shrinking by 15–20%. No ABI breaks; rolling upgrades are safe.",
    citations: [
      { title: 'PostgreSQL 17.2 release notes', url: '#', author: 'postgresql.org' },
      { title: 'What the logical-replication fix actually fixes', url: '#', author: 'Crunchy Data' },
    ],
  },

    summary: "A denial-of-service in jackson-databind's polymorphic type handling (CVE-2026-1189) was disclosed Wednesday. Exploit requires attacker-controlled JSON hitting a default-typed ObjectMapper — so most Spring Boot apps using @JsonTypeInfo sparingly are unaffected, but anyone using enableDefaultTyping globally should move fast. 2.17.0 is the clean version; Dev Radar queued a PR proposal for your jackson-databind dependency (see the panel →).",
    citations: [
      { title: 'CVE-2026-1189 advisory', url: '#', author: 'GitHub Security' },
      { title: 'When default typing bites', url: '#' },
      { title: 'FasterXML/jackson-databind#4412', url: '#' },
    ],
  },
];

const SAMPLE_PROPOSALS = [
  { id: 'p1', cveId: 'CVE-2026-1189', packageName: 'jackson-databind', fromVersion: '2.16.1', toVersion: '2.17.0', status: 'PROPOSED' },
  { id: 'p2', cveId: 'CVE-2026-0821', packageName: 'spring-web', fromVersion: '6.1.4', toVersion: '6.1.7', status: 'PROPOSED' },
];

// ─── useTweaks (edit-mode bridge) ───────────────────────────────────────

function useProductTweaks() {
  const [tweaks, setTweaks] = React.useState(PRODUCT_TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      else if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const patch = React.useCallback((partial) => {
    setTweaks((t) => {
      const next = { ...t, ...partial };
      try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: partial }, '*'); } catch (e) {}
      return next;
    });
  }, []);
  return { tweaks, editMode, patch };
}

function ProductTweaksPanel({ tweaks, patch, onClose }) {
  const row = (label, children) => (
    <div style={{ marginBottom: 16 }}>
      <div style={{
        fontSize: 11, textTransform: 'uppercase', letterSpacing: '0.08em',

      }}>{label}</div>
      {children}
    </div>
  );
  const seg = (value, current, onClick, label) => (
    <button onClick={onClick} style={{
      padding: '6px 12px', fontSize: 12,
      background: value === current ? '#2d2a26' : 'transparent',
      color: value === current ? '#fff' : '#2d2a26',
      border: '1px solid ' + (value === current ? '#2d2a26' : '#e8e4df'),
      borderRadius: 6, cursor: 'pointer', fontFamily: 'inherit',
    }}>{label}</button>
  );
  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 1000,
      width: 280, background: '#fff',
      border: '1px solid #e8e4df', borderRadius: 12,
      boxShadow: '0 4px 24px rgba(45,42,38,0.12)',
      padding: 16, fontFamily: "'Inter', system-ui, sans-serif",
      color: '#2d2a26', fontSize: 13,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <div style={{ fontWeight: 600 }}>Tweaks</div>
        <button onClick={onClose} style={{
          background: 'transparent', border: 'none', cursor: 'pointer',
          color: '#6b655e', fontSize: 18, padding: 0, width: 20, height: 20,
        }}>×</button>
      </div>

      {row('Tag chip style',
        <div style={{ display: 'flex', gap: 6 }}>
          {seg('filled', tweaks.chipStyle, () => patch({ chipStyle: 'filled' }), 'Filled')}
          {seg('checkmark', tweaks.chipStyle, () => patch({ chipStyle: 'checkmark' }), 'Checkmark')}
        </div>
      )}

      {row('Radar row shape',
        <div style={{ display: 'flex', gap: 6 }}>
          {seg('editorial', tweaks.rowStyle, () => patch({ rowStyle: 'editorial' }), 'Editorial')}
          {seg('card', tweaks.rowStyle, () => patch({ rowStyle: 'card' }), 'Card')}
        </div>
      )}

      {row('Auto-stream on Detail',
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
          <input type="checkbox" checked={tweaks.autoStream}
            onChange={(e) => patch({ autoStream: e.target.checked })} />
          <span>Replay SSE stream on load</span>
        </label>
      )}
    </div>
  );
}

// ─── Interactive app ────────────────────────────────────────────────────

function ProductApp() {
  const { tweaks, editMode, patch } = useProductTweaks();
  const [screen, setScreen] = React.useState('radars');
  const [detailId, setDetailId] = React.useState('r1');
  const [interests, setInterests] = React.useState(new Set(DEFAULT_INTERESTS));
  const [radars, setRadars] = React.useState([
    mkRadar(1, 'READY', 0),
    mkRadar(2, 'READY', 7),
    mkRadar(3, 'READY', 14),
  ]);

  const navigate = (key, data) => {
    if (key === 'detail') { setDetailId(data.id); setScreen('detail'); }
    else setScreen(key);
  };

  const hasInterests = interests.size > 0;

  const generate = () => {
    const id = 'r' + (radars.length + 10);
    setRadars([mkRadar(radars.length + 10, 'GENERATING', -1), ...radars]);
    setDetailId(id);
    setScreen('detail');
  };

  const content = (() => {
    if (screen === 'interests') return (
      <InterestsScreen
        selected={interests}
        onChange={setInterests}
        onSave={(s) => setInterests(new Set(s))}
        chipStyle={tweaks.chipStyle}
      />
    );
    if (screen === 'radars') return (
      <RadarListScreen
        radars={radars}
        hasInterests={hasInterests}
        rowStyle={tweaks.rowStyle}
        onOpen={(id) => navigate('detail', { id })}
        onGenerate={generate}
        onGoToInterests={() => setScreen('interests')}
      />
    );
    if (screen === 'detail') {
      const radar = radars.find((r) => r.id === detailId) || radars[0];
      return (
        <StreamingDetail radar={radar} autoStream={tweaks.autoStream} />
      );
    }
    return null;
  })();

  return (
    <>
      <AppShell active={screen} onNavigate={navigate}>
        {content}
      </AppShell>
      {editMode && <ProductTweaksPanel tweaks={tweaks} patch={patch} onClose={() => {}} />}
    </>
  );
}

// Wrapper that simulates SSE: themes arrive one at a time on a timer.
function StreamingDetail({ radar, autoStream = true, forceStreaming = null, forcedThemes = null, forcedProposals = null }) {
  const initial = radar.status === 'GENERATING' || (autoStream && forceStreaming !== false);
  const [streaming, setStreaming] = React.useState(forceStreaming !== null ? forceStreaming : initial);
  const [themes, setThemes] = React.useState(
    forcedThemes !== null ? forcedThemes :
    initial ? [] : SAMPLE_THEMES
  );
  const [proposals, setProposals] = React.useState(forcedProposals !== null ? forcedProposals : SAMPLE_PROPOSALS);

  const tick = React.useRef(0);
  const streamGen = React.useRef(0);

  const startStream = React.useCallback(() => {
    if (tick.current) clearTimeout(tick.current);
    const gen = ++streamGen.current;
    setStreaming(true);
    setThemes([]);
    setProposals(SAMPLE_PROPOSALS.map((p) => ({ ...p, status: 'PROPOSED' })));
    const delays = [1400, 3200, 3000];
    let i = 0;
    const push = () => {
      if (gen !== streamGen.current) return; // stale timer
      if (i >= SAMPLE_THEMES.length) return;
      const theme = SAMPLE_THEMES[i];
      if (!theme) return;
      setThemes((prev) => (prev.length > i ? prev : [...prev, theme]));
      i++;
      if (i < SAMPLE_THEMES.length) {
        tick.current = setTimeout(push, delays[i]);
      } else {
        tick.current = setTimeout(() => { if (gen === streamGen.current) setStreaming(false); }, 500);
      }
    };
    tick.current = setTimeout(push, delays[0]);
  }, []);

  React.useEffect(() => {
    if (forceStreaming !== null) return;
    if (initial) startStream();
    return () => {
      streamGen.current++; // invalidate any in-flight timers
      if (tick.current) { clearTimeout(tick.current); tick.current = null; }
    };
    // eslint-disable-next-line
  }, []);

  const approve = (id, version) => {
    setProposals((ps) => ps.map((p) => p.id === id ? { ...p, status: 'EXECUTED', prUrl: '#', toVersion: version } : p));
  };
  const dismiss = (id) => setProposals((ps) => ps.map((p) => p.id === id ? { ...p, status: 'DISMISSED' } : p));
  const retry = (id) => setProposals((ps) => ps.map((p) => p.id === id ? { ...p, status: 'PROPOSED', failureReason: undefined } : p));

  return (
    <RadarDetailScreen
      radar={radar}
      themes={themes}
      streaming={streaming}
      expectedThemeCount={SAMPLE_THEMES.length}
      proposals={proposals}
      onApprove={approve}
      onDismiss={dismiss}
      onRetry={retry}
      onReplay={forceStreaming === null ? startStream : undefined}
    />
  );
}

}

    mkRadar(2, 'GENERATING', -1),
    mkRadar(3, 'READY', 7),
    mkRadar(4, 'READY', 14),
    mkRadar(5, 'FAILED', 21),
    mkRadar(6, 'READY', 28),
  ];
  const sampleRadar = mkRadar(9, 'READY', 0);

  return (
    <DesignCanvas>
      <DCSection id="interests" title="Interests" subtitle="Empty and post-selection states.">
        <DCArtboard id="interests-empty" label="Picker · empty" width={1280} height={800}>
          <StaticShell active="interests">
            <InterestsScreen selected={new Set()} chipStyle={chipStyle} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="interests-selected" label="Picker · 7 selected" width={1280} height={800}>
          <StaticShell active="interests">
            <InterestsScreen selected={new Set(DEFAULT_INTERESTS)} chipStyle={chipStyle} initialSaved={new Set()} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="interests-checkmark" label="Picker · checkmark variant" width={1280} height={800}>
          <StaticShell active="interests">
            <InterestsScreen selected={new Set(DEFAULT_INTERESTS)} chipStyle="checkmark" initialSaved={new Set()} />
          </StaticShell>
        </DCArtboard>
      </DCSection>

      <DCSection id="radars" title="Radars" subtitle="Empty / single / many, plus first-time banner.">
        <DCArtboard id="radars-empty-no-interests" label="Empty · no interests (banner)" width={1280} height={800}>
          <StaticShell active="radars">
            <RadarListScreen radars={[]} hasInterests={false} rowStyle={rowStyle} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="radars-empty" label="Empty · has interests" width={1280} height={800}>
          <StaticShell active="radars">
            <RadarListScreen radars={[]} hasInterests={true} rowStyle={rowStyle} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="radars-one" label="One radar" width={1280} height={800}>
          <StaticShell active="radars">
            <RadarListScreen radars={oneRadar} hasInterests={true} rowStyle={rowStyle} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="radars-many" label="Six radars · mixed states" width={1280} height={800}>
          <StaticShell active="radars">
            <RadarListScreen radars={manyRadars} hasInterests={true} rowStyle={rowStyle} />
          </StaticShell>
        </DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Radar detail" subtitle="The hero screen. Live-streaming vs complete.">
        <DCArtboard id="detail-streaming" label="Streaming · 1 of 3 themes in" width={1280} height={800}>
          <StaticShell active="radars">
            <StreamingDetail radar={sampleRadar} forceStreaming={true}
              forcedThemes={[SAMPLE_THEMES[0]]}
              forcedProposals={SAMPLE_PROPOSALS} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="detail-complete" label="Complete" width={1280} height={800}>
          <StaticShell active="radars">
            <StreamingDetail radar={sampleRadar} forceStreaming={false}
              forcedThemes={SAMPLE_THEMES}
              forcedProposals={SAMPLE_PROPOSALS} />
          </StaticShell>
        </DCArtboard>
        <DCArtboard id="detail-executed" label="Complete · PR approved" width={1280} height={800}>
          <StaticShell active="radars">

// ─── Mode bar + Root ────────────────────────────────────────────────────

function ProductRoot() {
  const { tweaks, editMode, patch } = useProductTweaks();
  const [mode, setMode] = React.useState(() => localStorage.getItem('dr2-mode') || 'flow');
  React.useEffect(() => { localStorage.setItem('dr2-mode', mode); }, [mode]);

  return (
    <>
      <div style={{
        position: 'fixed', top: 12, left: '50%', transform: 'translateX(-50%)',
        zIndex: 800,
        background: 'rgba(255,255,255,0.94)',
        backdropFilter: 'blur(12px)',
        border: '1px solid #e8e4df',
        borderRadius: 999,
        padding: 4,
        display: 'flex', gap: 2,
        boxShadow: '0 1px 2px rgba(45,42,38,0.04)',
        fontFamily: "'Inter', system-ui, sans-serif", fontSize: 13,
      }}>
        {[['flow', 'Interactive flow'], ['canvas', 'All states']].map(([m, label]) => (
          <button key={m} onClick={() => setMode(m)} style={{
            padding: '6px 14px', borderRadius: 999, border: 'none',
            background: mode === m ? '#2d2a26' : 'transparent',
            color: mode === m ? '#fff' : '#2d2a26',
            cursor: 'pointer', fontFamily: 'inherit', fontSize: 13, fontWeight: 500,
          }}>{label}</button>
        ))}
      </div>

      {mode === 'flow' ? <ProductApp /> : <ProductCanvas />}

      {editMode && mode === 'flow' && <ProductTweaksPanel tweaks={tweaks} patch={patch} onClose={() => {}} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProductRoot />);
