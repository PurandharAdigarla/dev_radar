spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        type:
          preferred_boolean_jdbc_type: tinyint
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  ai:
    mcp:
      server:
        name: devradar
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/message
        sse-endpoint: /mcp/sse

jwt:
  secret: test-only-secret-must-be-at-least-256-bits-long-for-hs256-algorithm-to-work
  access-token-ttl-minutes: 60
  refresh-token-ttl-days: 1

devradar:
  ai:
    orchestrator-model: gemini-2.5-flash
    scoring-model: llama-3.3-70b-versatile
    max-tool-iterations: 4
    max-tokens-per-call: 1024
    retry:
      max-attempts: 1
      initial-delay-ms: 100
  ingest:
    hn:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
    gh-trending:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
    ghsa:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
    gh-releases:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
      repos: ""
    article:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
    dep-scan:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000
    dep-release:
      fixed-delay-ms: 86400000
      initial-delay-ms: 86400000

anthropic:
  api-key: ""

google-ai:
  api-key: ""
  base-url: http://localhost:0

groq:
  api-key: ""
  base-url: http://localhost:0
  default-model: llama-3.3-70b-versatile

encryption:
  github-token-key-base64: UEjGRJjRBYGZQRdsB7Cln1mLG0qlxPEAU+Vq/Sx0iYE=

frontend:
  base-url: http://localhost:5173

github:
  oauth:
    client-id: test-client-id
    client-secret: test-client-secret
    redirect-uri: http://localhost:8080/api/auth/github/callback
    authorize-url: http://localhost:0/login/oauth/authorize
    token-url: http://localhost:0/login/oauth/access_token
  api:
    base-url: http://localhost:0

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
