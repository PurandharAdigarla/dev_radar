spring:
  application:
    name: devradar-backend
  datasource:
    url: jdbc:mysql://localhost:${DB_HOST_PORT:3306}/devradar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: devradar
    password: devradar
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  data:
    redis:
      host: localhost
      port: ${REDIS_HOST_PORT:6379}
    web:
      pageable:
        max-page-size: 100
        default-page-size: 20

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-prod-must-be-at-least-256-bits-long-ok}
  access-token-ttl-minutes: 1440
  refresh-token-ttl-days: 30

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  orchestrator-model: claude-sonnet-4-6
  scoring-model: claude-haiku-4-5-20251001
  max-tool-iterations: 8
  max-tokens-per-call: 4096

google-ai:
  api-key: ${GOOGLE_AI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com

encryption:
  github-token-key-base64: ${GITHUB_TOKEN_ENCRYPTION_KEY:UEjGRJjRBYGZQRdsB7Cln1mLG0qlxPEAU+Vq/Sx0iYE=}
