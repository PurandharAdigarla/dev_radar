spring:
  application:
    name: devradar-backend
  datasource:
    url: jdbc:mysql://localhost:${DB_HOST_PORT:3306}/devradar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: devradar
    password: devradar
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
      hibernate.type.preferred_boolean_jdbc_type: TINYINT
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM:}
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  data:
    web:
      pageable:
        max-page-size: 200
        default-page-size: 20

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-prod-must-be-at-least-256-bits-long-ok}
  access-token-ttl-minutes: 1440
  refresh-token-ttl-days: 30

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

google-ai:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

devradar:
  rate-limit:
    radar-per-hour: 10
  ai:
    model: ${AI_MODEL:gemini-2.5-flash}
    orchestrator-model: ${AI_ORCHESTRATOR_MODEL:gemini-2.5-flash}
    scoring-model: ${AI_SCORING_MODEL:gemini-2.5-flash}
    max-tool-iterations: ${AI_MAX_TOOL_ITERATIONS:10}
    max-tokens-per-call: ${AI_MAX_TOKENS_PER_CALL:16384}
  scheduling:
    enabled: ${SCHEDULING_ENABLED:false}
  internal:
    trigger-secret: ${TRIGGER_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
