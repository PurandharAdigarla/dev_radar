spring:
  application:
    name: devradar-backend
  datasource:
    url: jdbc:mysql://localhost:${DB_HOST_PORT:3306}/devradar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: devradar
    password: devradar
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  data:
    redis:
      host: localhost
      port: ${REDIS_HOST_PORT:6379}
    web:
      pageable:
        max-page-size: 200
        default-page-size: 20
  ai:
    mcp:
      server:
        name: devradar
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/message
        sse-endpoint: /mcp/sse

jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-prod-must-be-at-least-256-bits-long-ok}
  access-token-ttl-minutes: 1440
  refresh-token-ttl-days: 30

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  orchestrator-model: claude-sonnet-4-6
  scoring-model: claude-haiku-4-5-20251001
  max-tool-iterations: 8
  max-tokens-per-call: 4096

google-ai:
  api-key: ${GOOGLE_AI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com

encryption:
  github-token-key-base64: ${GITHUB_TOKEN_ENCRYPTION_KEY:UEjGRJjRBYGZQRdsB7Cln1mLG0qlxPEAU+Vq/Sx0iYE=}

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET:}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:http://localhost:8080/api/auth/github/callback}
    authorize-url: https://github.com/login/oauth/authorize
    token-url: https://github.com/login/oauth/access_token
  api:
    base-url: https://api.github.com

devradar:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:false}
  internal:
    trigger-secret: ${TRIGGER_SECRET:}
  ingest:
    gh-releases:
      repos: >-
        facebook/react:react,frontend,javascript;
        vercel/next.js:next_js,react,frontend;
        sveltejs/svelte:svelte,frontend;
        vuejs/core:vue,frontend,javascript;
        angular/angular:angular,frontend,typescript;
        spring-projects/spring-boot:spring_boot,java,backend;
        spring-projects/spring-framework:spring_boot,java,backend;
        django/django:django,python,backend;
        tiangolo/fastapi:fastapi,python,backend;
        rails/rails:rails,backend;
        golang/go:go;
        rust-lang/rust:rust;
        JetBrains/kotlin:kotlin;
        apple/swift:swift;
        microsoft/TypeScript:typescript;
        moby/moby:docker,devops;
        kubernetes/kubernetes:kubernetes,devops;
        hashicorp/terraform:terraform,devops;
        redis/redis:redis,database;
        tailwindlabs/tailwindcss:frontend;
        vitejs/vite:frontend,javascript;
        modelcontextprotocol/specification:mcp,ai_tooling;
        langchain-ai/langchain:ai_tooling,llm,python;
        ollama/ollama:ai_tooling,llm

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
