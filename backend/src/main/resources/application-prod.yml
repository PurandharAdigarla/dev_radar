spring:
  datasource:
    url: jdbc:mysql:///${DB_NAME:devradar}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false
    username: ${DB_USER}
    password: ${DB_PASSWORD}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}

frontend:
  base-url: ${FRONTEND_BASE_URL}

devradar:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:false}
  internal:
    trigger-secret: ${TRIGGER_SECRET}
