spring:
  datasource:
    url: jdbc:mysql:///${DB_NAME:devradar}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}

encryption:
  github-token-key-base64: ${GITHUB_TOKEN_ENCRYPTION_KEY}

frontend:
  base-url: ${FRONTEND_BASE_URL}

github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI}

devradar:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:false}
  internal:
    trigger-secret: ${TRIGGER_SECRET}
