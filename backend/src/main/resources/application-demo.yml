# ── Demo Profile ──
# Cloud Run deployment — Cloud SQL socket factory
# Secrets injected via Cloud Run from GCP Secret Manager

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  datasource:
    url: jdbc:mysql:///${DB_NAME:devradar}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.mysql.SocketFactory&useSSL=false
    username: ${DB_USER}
    password: ${DB_PASSWORD}

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}

frontend:
  base-url: ${FRONTEND_BASE_URL}

devradar:
  scheduling:
    enabled: ${SCHEDULING_ENABLED:false}
  internal:
    trigger-secret: ${TRIGGER_SECRET}

management:
  health:
    redis:
      enabled: false
    mail:
      enabled: false
