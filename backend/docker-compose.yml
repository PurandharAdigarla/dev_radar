services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devradar
      MYSQL_USER: devradar
      MYSQL_PASSWORD: devradar
    ports:
      - "${DB_HOST_PORT:-3306}:3306"
    volumes:
      - devradar-mysql:/var/lib/mysql
  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - devradar-redis:/data
volumes:
  devradar-mysql:
  devradar-redis:
